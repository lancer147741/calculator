<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator</title>
  <link rel="stylesheet" href="style/style.css">
</head>
<body>
  <div class="calculator">
    <input id="display" disabled placeholder="0">

    <div class="buttons">
      <button class="function" onclick="ui.clearAll()">AC</button>
      <button class="function" onclick="ui.deleteLast()">⌫</button>
      <button class="operator" onclick="ui.append('/')">/</button>
      <button class="operator" onclick="ui.append('*')">*</button>

      <button onclick="ui.append('7')">7</button>
      <button onclick="ui.append('8')">8</button>
      <button onclick="ui.append('9')">9</button>
      <button class="operator" onclick="ui.append('-')">-</button>

      <button onclick="ui.append('4')">4</button>
      <button onclick="ui.append('5')">5</button>
      <button onclick="ui.append('6')">6</button>
      <button class="operator" onclick="ui.append('+')">+</button>

      <button onclick="ui.append('1')">1</button>
      <button onclick="ui.append('2')">2</button>
      <button onclick="ui.append('3')">3</button>
      <button class="operator" onclick="calculator.calculate()">=</button>

      <button class="zero" onclick="ui.append('0')">0</button>
      <button onclick="ui.append('.')">.</button>
    </div>

    <div id="history-container">
      <h3>History</h3>
      <ul id="history-list"></ul>
    </div>
  </div>

  <script src="js/calculator.js"></script>
  <script src="js/history.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
